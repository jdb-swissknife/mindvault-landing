    <path d="M92,190 L100,195 L108,190" fill="none" stroke="#4f6ef7" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- MindVault text -->
  <text x="210" y="108" font-family="'Inter', system-ui, sans-serif" font-size="52" font-weight="800" fill="#1a2a6c" letter-spacing="-2">
    Mind
    <tspan fill="#4f6ef7">Vault</tspan>
  </text>
  <!-- Studio subtitle -->
  <text x="212" y="138" font-family="'Inter', system-ui, sans-serif" font-size="13" font-weight="500" fill="#64748b" letter-spacing="6">
